<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efek Klik Kaget Bersuara</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #tombolMulai {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background-color: #ff3333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
        }

        #kontenKejutan {
            display: none;
            text-align: center;
            animation: guncang 0.15s infinite;
        }

        #kontenKejutan h1 {
            font-size: 3.5rem;
            color: #ff0000;
            margin: 0 0 10px 0;
            text-shadow: 3px 3px 5px #000;
        }

        #kontenKejutan img {
            max-width: 85%;
            max-height: 50vh;
            border: 3px solid #ff0000;
            border-radius: 10px;
        }

        /* Gaya untuk tulisan prank popup */
        .teks-prank {
            display: none; /* Disembunyikan dulu di awal */
            font-size: 1.8rem;
            color: #ffff00;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            animation: popupZoom 1.5s ease-in-out infinite;
        }

        /* Gaya untuk tulisan akhir By Baim */
        .teks-pembuat {
            display: none; /* Disembunyikan dulu di awal */
            font-size: 1.6rem; /* Ukuran sedikit diperbesar agar jelas */
            color: #ff0000; /* Warna merah */
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
            animation: popupZoom 1.2s ease-in-out infinite;
        }

        /* Animasi guncang untuk efek kaget */
        @keyframes guncang {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -3px) rotate(-1deg); }
            20% { transform: translate(-4px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 3px) rotate(0deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 3px) rotate(-1deg); }
            60% { transform: translate(-4px, 2px) rotate(0deg); }
            70% { transform: translate(3px, 2px) rotate(-1deg); }
            80% { transform: translate(-2px, -2px) rotate(1deg); }
            100% { transform: translate(2px, -3px) rotate(0deg); }
        }

        /* Animasi Popup Zoom In dan Zoom Out berulang */
        @keyframes popupZoom {
            0% { transform: scale(0); opacity: 0; }
            20% { transform: scale(1.2); opacity: 1; }
            40% { transform: scale(1); }
            60% { transform: scale(1.1); }
            80% { transform: scale(1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Tombol pemicu awal -->
    <button id="tombolMulai" onclick="munculkanKejutan()">KLIK DI SINI</button>

    <!-- Konten utama -->
    <div id="kontenKejutan">
        <h1>CI LUK BAAAAAAA</h1>
        
        <img src="Horor.png" alt="Kejutan">
        
        <!-- Tulisan prank tambahan di bawah gambar -->
        <div id="tulisanPrank" class="teks-prank">
            Selamat, Anda Kena PRANK, HAAAAHAAAAAHAHAAAHAAAA😆😃😃
        </div>

        <!-- Tulisan akhir warna merah -->
        <div id="tulisanPembuat" class="teks-pembuat">
            By Baim
        </div>
    </div>

    <!-- Elemen Audio Tersembunyi -->
    <audio id="suaraMenjerit" src="suarahantu.mp3" preload="auto"></audio>

    <script>
        function munculkanKejutan() {
            // Sembunyikan tombol utama
            document.getElementById('tombolMulai').style.display = 'none';
            
            // Tampilkan gambar kaget instan beserta suara
            document.getElementById('kontenKejutan').style.display = 'block';
            
            var audio = document.getElementById('suaraMenjerit');
            audio.play().catch(function(error) {
                console.log("Gagal memutar audio otomatis: ", error);
            });

            // 1. Munculkan tulisan prank di pertengahan suara (detik ke-2)
            setTimeout(function() {
                document.getElementById('tulisanPrank').style.display = 'block';
            }, 2000); 

            // 2. Munculkan tulisan "By Baim" setelah tulisan prank (detik ke-4)
            // 4000 milidetik = 4 detik dari awal klik
            setTimeout(function() {
                document.getElementById('tulisanPembuat').style.display = 'block';
            }, 4000); 
        }
    </script>

</body>
</html>
